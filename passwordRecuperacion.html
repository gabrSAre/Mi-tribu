<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Tribe</title>

    <style>
        body{
            background-color:white;
            font-family: Georgia, 'Times New Roman', Times, serif;
        }

        .container{
            width: 60%;
            height: 500px;
            margin: 0 auto;
            border-radius: 15px;
            box-shadow: 1px 2px 30px 10px#cedbe7;
            padding-left: 50px;
            padding-top: 5px;
            
        }

      .container form{
        margin-bottom: 220px;
      }
        
        .container h1{
           font-size: 30px;
           margin-bottom: 5px;
           color:#03658C;
        }

        .campos label{
            font-size: 20px;
            display: block;
            color:#03658C;
        }

        .campos input{
            width: 90%;
            height: 40px;
            background-color: #cedbe7;
            border: 2px solid #03658C;
            border-radius: 15px;
            padding: 5px 0;
            font-size: 20px;
            font-weight: bold;
            margin: 5px 0;
            color:#03658C;
        }

        .boton{
            width: 90%;
            height: 40px;
            font-size: 20px;
            color: #f5f5f5;
            border:2px solid white;
            border-radius: 20px;
            background: #03658C;
            margin: 5px;
           
        }

        .container a{
            font-size: 30px;
            color:#02734A;
         
        }


    </style>
</head>


<body>

    <div class="container">
        <h1>Recupera tu contraseña</h1>
        <form action="#" method="post">
            <div class="campos">
                <label for="email">Ingresa tu correo instucional</label>
                <input type="email" placeholder="user@cesde.net" required id="email">
            </div>
            <button type="submit" class="boton">Siguiente</button>   
       </form>
       <a href="index.html">Atrás</a>
    </div>
    
</body>
</html>
