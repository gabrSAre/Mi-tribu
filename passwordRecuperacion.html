<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Tribe</title>

    <style>
        body{
            background-color: rgb(13, 12, 12);
            font-family: Georgia, 'Times New Roman', Times, serif;
        }

        .container{
            width: 60%;
            height: 500px;
            margin: 0 auto;
            border-radius: 15px;
            box-shadow: 5px 1px 10px rgb(255, 255, 255);
            padding-left: 50px;
            padding-top: 5px;
            
        }

      .container form{
        margin-bottom: 220px;
      }
        
        .container h1{
            font-size: 30px;
           margin-bottom: 5px;
           color:#869ca5;
        }

        .campos label{
            font-size: 20px;
            display: block;
            color:#869ca5;
        }

        .campos input{
            width: 90%;
            height: 40px;
            border: 2px solid #869ca5;
            border-radius: 15px;
            padding: 5px 0;
            font-size: 20px;
            margin: 5px 0;
            color:#869ca5;
        }

        .boton{
            width: 90%;
            height: 40px;
            padding: 5px 0;
            font-size: 20px;
            color: #f5f5f5;
            border:2px solid #eb3f00;
            border-radius: 20px;
            background: #03658C;
            background: radial-gradient(circle, rgba(3, 101, 140, 1) 11%, rgba(12, 89, 68, 1) 64%, rgba(2, 115, 74, 1) 88%);
            margin: 5px;
           
        }

        .container a{
            font-size: 30px;
            color:#869ca5;
         
        }


    </style>
</head>


<body>

    <div class="container">
        <h1>Recupera tu contraseña</h1>
        <form action="#" method="post">
            <div class="campos">
                <label for="email">Ingresa tu correo instucional</label>
                <input type="email" placeholder="user@cesde.net" required id="email">
            </div>
            <button type="submit" class="boton">Siguiente</button>   
       </form>
       <a href="index.html" target="_blank">Atrás</a>
    </div>
    
</body>
</html>
