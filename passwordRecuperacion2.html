<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Tribe</title>

   <style>

    body{
        font-family: Georgia, 'Times New Roman', Times, serif;
    }

    .container{
        width: 60%;
        height: 500px;
        margin: 0 auto;
        box-shadow: 1px 2px 30px 10px#cedbe7;
        border-radius: 15px;
        padding-left: 50px;
        padding-top: 5px;
    }


    .container h1{
        font-size: 30px;
        color:#03658C;
    }

    .campos label{
            font-size: 20px;
            display: block;
            color:#03658C;
        }

        .campos input{
            width: 90%;
            height: 40px;
            background-color: #f1f1f1;
            border: 2px solid #03658C;
            border-radius: 15px;
            padding: 5px 0;
            font-size: 20px;
            font-weight: bold;
            margin: 5px 0;
            color:#03658C;
        }

        .boton{
            width: 90%;
            height: 40px;
            margin-top: 10px;
            border-radius: 20px;
            border: 2px solid white;
            font-size: 20px;
            color:white;
            background-color:#03658C;


        }



   </style>

</head>
<body>
    <div class="container">
        <h1>Ingresa el código de seguridad</h1>
        <form action="#" method="post">
            <div class="campos">
                <label for="number">Ingresa el código de seguridad</label>
                <input type="number" placeholder="123..." required id="number">
            </div>
            <div class="campos">
                <label for="">Nueva contraseña</label>
                <input type="number" minlength="8" placeholder="123..." required>
            </div>

             <div class="campos">
                <label for="">Repita la contraseña</label>
                <input type="number" minlength="8" placeholder="123..." required>
            </div>
            <button type="submit" class="boton">Continuar</button>   
       </form>
    </div>
</body>
</html>
