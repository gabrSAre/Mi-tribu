<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My tribe</title>
    <style>
        body{
            background-color: black;
            
        }

        #container{
            width:100%;
            height: 1000px;
            display: flex;
            font-family: Georgia, 'Times New Roman', Times, serif;
        }


        #container #logo{
            width: 50%;
            padding: 308.8px 0;
        }

        #container #logo img{
            width: 80%;
               
        }

        #container #login{
            width: 50%;
            margin: 308px 0;
           
        }

        #container #login h1{
            font-size:25px;
            text-align: left;
            color:#bfd2d9;
        }

        .campos label{
            font-size: 20px;
            color:#bfd2d9;
            font-weight: bold;
            display: block;
            margin-bottom: 7px;
        }
        
        .campos input{
            width: 80%;
            height: 35px;
            border: 3px solid #03658C;
            border-radius: 5px;
            box-shadow: 1px 2px 10px 1px #03658C;
            margin-bottom: 10px;
            background-color: #0a0a0a;
            font-size: 20px;
            font-weight: bold;
            color:#03658C;
        }
        
        .boton{
            width: 81%;
            height: 35px;
            border:3px solid #03658C;
            border-radius: 15px;
            background-color: #0a0a0a;
            display: block;
            margin:20px 0;
            font-size: 20px;
            color:#03658C;

        } 

        .boton1{
            width: 81%;
            height: 35px;
            border:3px solid #02734A;
            border-radius: 15px;
            box-shadow: 1px 2px 10px 1px #02734A;
            background-color: #0a0a0a;
            display: block;
            margin-top: 50px;
            font-size: 20px;
            color:#02734A;
        }

        #login form a{
            font-size: 20px;
            color:#1105f2;
            text-align:left;
            display: block;
        }
     
  
    </style>
</head>

<body>
    
    <div id="container">
        <div id="logo">
            <img src="img/LOGO.png" alt="Logo de My tribe">
        </div>


    
        <div id="login">
            <h1>Inicia sección en MY TRIBE</h1>
            <form>
                <div class="campos">
                    <label for="email">Correo electrónico</label>
                    <input type="text" id="email" name="email" placeholder="user@cesde.net">
                </div>
                
                <div class="campos">
                    <label for="contraseña">Contraseña</label>
                    <input type="password" id="contraseña" name="contraseña" placeholder="1a2B34....." minlength="8">
                </div>

                <button type="submit" class="boton">Iniciar sección</button>
                  <a href="passwordRecuperacion.html">¿Olvidaste tu contraseña?</a>
                <button type="submit" class="boton1">Crear cuenta</button>
            </form>
          
        

        </div>
    </div>

</body>
</html>
